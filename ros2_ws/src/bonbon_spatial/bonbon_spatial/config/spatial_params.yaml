spatial_reasoning_node:
  ros__parameters:
    publish_rate_hz: 5.0
    entity_timeout_sec: 5.0
    personal_space:
      intimate_m: 0.45
      personal_m: 1.2
      social_m: 3.6
      public_m: 7.6
      stop_distance_m: 0.6
      slow_distance_m: 1.5
      approach_target_m: 1.0

    # Forward-corridor blockage detection
    blockage:
      corridor_half_width_m: 0.5   # ± lateral half-width of forward corridor
      corridor_length_m: 2.0       # how far ahead the corridor extends
      persistence_sec: 1.5         # sustained occupancy before declaring blocked

    # Dynamic-obstacle (constant-velocity) collision prediction
    prediction:
      horizon_sec: 2.5             # how far ahead to predict
      timestep_sec: 0.25           # path sampling interval

    # ModuleHealth heartbeat rate (Hz)
    health_rate_hz: 1.0

    zones: []   # list of {zone_id, zone_type, polygon:[{x,y}...], min_clearance_m, reason}
