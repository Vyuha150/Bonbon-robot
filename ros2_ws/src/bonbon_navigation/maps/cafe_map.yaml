# BonBon café map descriptor
# Generated by: ros2 run nav2_map_server map_saver_cli -f cafe_map
#
# Replace cafe_map.pgm with the actual PGM file after running SLAM.
# The values below match a 400×400 cell grid at 5 cm/cell,
# covering a 20 m × 20 m area origin at (-2, -2).

image: cafe_map.pgm
mode: trinary
resolution: 0.050000         # m/cell
origin: [-2.000000, -2.000000, 0.000000]
negate: 0
occupied_thresh: 0.65
free_thresh: 0.25
